# ============================================================
# Decap CMS Konfiguration — The Freescape Project
# ============================================================
backend:
  name: git-gateway
  branch: main

site_url: https://thefreescapeproject.netlify.app
media_folder: "assets/img/blog"
public_folder: "/assets/img/blog"
locale: de

collections:
- name: "posts"
    label: "📝 Blogbeiträge"
    label_singular: "Blogbeitrag"
    folder: "posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.id}}"
    editor:
      preview: false
    fields:
      - label: "🔑 URL-ID (kurz, keine Umlaute, keine Leerzeichen)"
        name: "id"
        widget: "string"
        hint: "Beispiel: salento-guide oder bogota-reisetipps — wird zum Dateinamen. Nur Kleinbuchstaben, Zahlen und Bindestriche!"
        pattern: ['^[a-z0-9-]+$', "Nur Kleinbuchstaben, Zahlen und Bindestriche erlaubt"]

      - label: "📰 Titel"
        name: "titel"
        widget: "string"
        hint: "Aussagekräftiger Titel des Artikels"

      - label: "✂️ Vorschautext (Teaser)"
        name: "teaser"
        widget: "text"
        hint: "1–2 Sätze Kurzbeschreibung für die Blogübersicht"

      - label: "📅 Datum"
        name: "datum"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false

      - label: "⏱️ Lesezeit"
        name: "lesezeit"
        widget: "string"
        default: "5 min"
        required: false
        hint: "Beispiel: 5 min oder 8 min"

      - label: "✍️ Autor"
        name: "autor"
        widget: "string"
        default: "Julia"

      - label: "🗂️ Artikel-Typ"
        name: "typ"
        widget: "select"
        options:
          - { label: "🗺️ Routen-Guide", value: "guide" }
          - { label: "💰 Kosten-Check", value: "kosten" }
          - { label: "🛡️ Sicherheit", value: "safety" }
          - { label: "💬 Erfahrungsbericht", value: "persoenlich" }

      - label: "🌍 Land"
        name: "land"
        widget: "select"
        options:
          - "Kolumbien"
          - "Ecuador"
          - "Peru"
          - "Bolivien"
          - "Chile"
          - "Argentinien"
          - "Uruguay"
          - "Paraguay"
          - "Brasilien"
          - "Galapagos"
          - "Allgemein"

      - label: "🔖 Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Stichwörter, z.B. Machu Picchu, Budget, Hostel"

      - label: "🖼️ Titelbild"
        name: "bild"
        widget: "image"
        required: false
        hint: "Bild für die Vorschaukarte und den Artikel-Header"

      - label: "😀 Fallback-Emoji (wenn kein Bild)"
        name: "bildEmoji"
        widget: "string"
        default: "✈️"
        required: false
        hint: "Wird angezeigt wenn kein Titelbild vorhanden"

      - label: "📝 Artikelinhalt"
        name: "body"
        widget: "markdown"
        hint: "Der vollständige Artikel. Du kannst auch Bilder einfügen — wechsle dazu auf Rich Text und klicke auf das + Symbol."
