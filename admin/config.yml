backend:
  name: git-gateway
  branch: main

media_folder: "assets/img/blog"
public_folder: "/assets/img/blog"

locale: de

collections:
  - name: "posts"
    label: "Blogbeiträge"
    label_singular: "Blogbeitrag"
    folder: "posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "artikel.html?post={{slug}}"
    editor:
      preview: false
    fields:
      - label: "Titel"
        name: "titel"
        widget: "string"
        hint: "Aussagekräftiger Titel des Artikels"

      - label: "Datum"
        name: "datum"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
        default: ""

      - label: "Autor"
        name: "autor"
        widget: "string"
        default: "Sergen & Julia"

      - label: "Land"
        name: "land"
        widget: "select"
        options:
          - "Kolumbien"
          - "Ecuador"
          - "Peru"
          - "Bolivien"
          - "Chile"
          - "Argentinien"
          - "Uruguay"
          - "Paraguay"
          - "Brasilien"
          - "Galapagos"
          - "Allgemein"

      - label: "Artikeltyp"
        name: "typ"
        widget: "select"
        options:
          - { label: "Routen-Guide", value: "guide" }
          - { label: "Kosten-Check", value: "kosten" }
          - { label: "Sicherheit", value: "safety" }
          - { label: "Erfahrungsbericht", value: "persoenlich" }

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Stichwörter, z.B. Machu Picchu, Budget, Hostel"

      - label: "Vorschautext (Teaser)"
        name: "teaser"
        widget: "text"
        hint: "1–2 Sätze Kurzbeschreibung für die Blogübersicht"

      - label: "Titelbild"
        name: "bild"
        widget: "image"
        required: false
        hint: "Bild für die Vorschaukarte (optional)"

      - label: "Bild-Emoji (Fallback)"
        name: "bildEmoji"
        widget: "string"
        default: "✈️"
        required: false
        hint: "Wird angezeigt wenn kein Titelbild vorhanden"

      - label: "Lesezeit"
        name: "lesezeit"
        widget: "string"
        default: "5 min"
        required: false

      - label: "Artikelinhalt"
        name: "body"
        widget: "markdown"
        hint: "Der vollständige Artikel. Formatierung mit Überschriften, Fettdruck etc. möglich."
